<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projectile Motion — TeLLM Sim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; flex: 1; }

    #controls {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .ctrl-group { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    label { color: #8b949e; white-space: nowrap; }
    input[type=range] { width: 90px; accent-color: #58a6ff; }
    .val { color: #58a6ff; min-width: 36px; text-align: right; font-weight: 600; }

    #launch-btn {
      margin-left: auto;
      background: #238636;
      border: none;
      color: #fff;
      padding: 6px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #launch-btn:hover { background: #2ea043; }

    #readouts {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(22,27,34,0.88);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
    }
    .r-label { color: #8b949e; }
    .r-val   { color: #f0883e; font-weight: 700; }
  </style>
</head>
<body>

<div id="readouts">
  <div><span class="r-label">Height: </span><span class="r-val" id="r-h">0.00 m</span></div>
  <div><span class="r-label">Range: </span><span class="r-val" id="r-x">0.00 m</span></div>
  <div><span class="r-label">Velocity: </span><span class="r-val" id="r-v">0.00 m/s</span></div>
  <div><span class="r-label">Time: </span><span class="r-val" id="r-t">0.00 s</span></div>
</div>

<canvas id="c"></canvas>

<div id="controls">
  <div class="ctrl-group">
    <label>Angle</label>
    <input type="range" id="angle" min="5" max="85" step="1" value="45"/>
    <span class="val" id="angle-v">45°</span>
  </div>
  <div class="ctrl-group">
    <label>v₀</label>
    <input type="range" id="v0" min="5" max="50" step="1" value="20"/>
    <span class="val" id="v0-v">20 m/s</span>
  </div>
  <div class="ctrl-group">
    <label>g</label>
    <input type="range" id="grav" min="1" max="25" step="0.1" value="9.8"/>
    <span class="val" id="grav-v">9.8</span>
  </div>
  <button id="launch-btn">🚀 Launch</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Parse URL params (so the chat iframe can pass dynamic values) ──────────
const qp = new URLSearchParams(location.search);
let ANGLE = parseFloat(qp.get('angle_deg') ?? 45);
let V0    = parseFloat(qp.get('initial_velocity_ms') ?? 20);
let G     = parseFloat(qp.get('gravity_ms2') ?? 9.8);

// Sync sliders to URL / defaults
const angleSlider = document.getElementById('angle');
const v0Slider    = document.getElementById('v0');
const gravSlider  = document.getElementById('grav');
angleSlider.value = ANGLE; v0Slider.value = V0; gravSlider.value = G;
document.getElementById('angle-v').textContent = ANGLE + '°';
document.getElementById('v0-v').textContent    = V0 + ' m/s';
document.getElementById('grav-v').textContent  = G;

angleSlider.oninput = e => { ANGLE = +e.target.value; document.getElementById('angle-v').textContent = ANGLE + '°'; };
v0Slider.oninput    = e => { V0    = +e.target.value; document.getElementById('v0-v').textContent    = V0 + ' m/s'; };
gravSlider.oninput  = e => { G     = +e.target.value; document.getElementById('grav-v').textContent  = G; };

// ── Three.js scene ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(devicePixelRatio);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const W = canvas.parentElement.clientWidth;
const H = window.innerHeight - 60;
renderer.setSize(W, H);

const camera = new THREE.OrthographicCamera(0, 0, 0, 0, -10, 10);
function updateCamera() {
  const w = renderer.domElement.clientWidth;
  const h = renderer.domElement.clientHeight;
  const maxRange  = 100;        // metres shown across
  const aspect    = w / h;
  const halfW     = maxRange / 2;
  const halfH     = halfW / aspect;
  const padLeft   = -10;
  camera.left   = padLeft;
  camera.right  = maxRange + 5;
  camera.top    = halfH * 1.2;
  camera.bottom = -5;
  camera.updateProjectionMatrix();
}
updateCamera();

// Grid / ground
const gridHelper = new THREE.GridHelper(200, 40, 0x1f2937, 0x1f2937);
gridHelper.rotation.x = Math.PI / 2;
gridHelper.position.set(50, 0, -1);
scene.add(gridHelper);

const groundGeo  = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-10,0,0), new THREE.Vector3(200,0,0)]);
const groundLine = new THREE.Line(groundGeo, new THREE.LineBasicMaterial({ color: 0x30363d }));
scene.add(groundLine);

// Trajectory dots
const MAX_TRAIL = 800;
const trailPositions = new Float32Array(MAX_TRAIL * 3);
const trailGeo  = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeo.setDrawRange(0, 0);
const trailMat  = new THREE.PointsMaterial({ color: 0x58a6ff, size: 0.4, transparent: true, opacity: 0.7 });
const trail     = new THREE.Points(trailGeo, trailMat);
scene.add(trail);

// Ball
const ballGeo  = new THREE.CircleGeometry(1.2, 32);
const ballMat  = new THREE.MeshBasicMaterial({ color: 0xf0883e });
const ball     = new THREE.Mesh(ballGeo, ballMat);
scene.add(ball);

// Velocity arrow (reuse a Line)
const arrowGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0)]);
const arrowLine = new THREE.Line(arrowGeo, new THREE.LineBasicMaterial({ color: 0x3fb950 }));
scene.add(arrowLine);

// ── Simulation state ───────────────────────────────────────────────────────
let simTime   = 0;
let running   = false;
let trailCount = 0;
const SPEED   = 1.0;   // simulation speed multiplier
const DT      = 1/60;

function physics(t) {
  const rad = ANGLE * Math.PI / 180;
  const vx  = V0 * Math.cos(rad);
  const vy  = V0 * Math.sin(rad);
  const x   = vx * t;
  const y   = vy * t - 0.5 * G * t * t;
  const tvx = vx;
  const tvy = vy - G * t;
  const spd = Math.sqrt(tvx*tvx + tvy*tvy);
  return { x, y, vx: tvx, vy: tvy, spd };
}

function reset() {
  simTime   = 0;
  running   = true;
  trailCount = 0;
  trailGeo.setDrawRange(0, 0);
  ball.position.set(0, 0, 0);
  // Clear old trail data
  trailPositions.fill(0);
  trailGeo.attributes.position.needsUpdate = true;
}

document.getElementById('launch-btn').addEventListener('click', reset);
reset();

// ── Readout elements ───────────────────────────────────────────────────────
const rH = document.getElementById('r-h');
const rX = document.getElementById('r-x');
const rV = document.getElementById('r-v');
const rT = document.getElementById('r-t');

// ── Render loop ────────────────────────────────────────────────────────────
let lastStamp = null;
function animate(stamp) {
  requestAnimationFrame(animate);

  if (running) {
    const dt = lastStamp ? Math.min((stamp - lastStamp) / 1000, 0.05) : DT;
    lastStamp = stamp;
    simTime += dt * SPEED;

    const { x, y, spd } = physics(simTime);

    if (y < 0 && simTime > 0.1) {
      running = false;
      lastStamp = null;
    } else {
      ball.position.set(x, Math.max(0, y), 0);

      // Trail
      if (trailCount < MAX_TRAIL) {
        trailPositions[trailCount * 3]     = x;
        trailPositions[trailCount * 3 + 1] = Math.max(0, y);
        trailPositions[trailCount * 3 + 2] = 0;
        trailCount++;
        trailGeo.setDrawRange(0, trailCount);
        trailGeo.attributes.position.needsUpdate = true;
      }

      // Arrow
      const rad   = Math.atan2(physics(simTime).vy, physics(simTime).vx);
      const len   = spd * 0.4;
      const arPos = arrowGeo.attributes.position;
      arPos.setXYZ(0, x, Math.max(0, y), 0);
      arPos.setXYZ(1, x + len * Math.cos(rad), Math.max(0, y) + len * Math.sin(rad), 0);
      arPos.needsUpdate = true;
      arrowGeo.computeBoundingSphere();

      rH.textContent = Math.max(0, y).toFixed(2) + ' m';
      rX.textContent = x.toFixed(2) + ' m';
      rV.textContent = spd.toFixed(2) + ' m/s';
      rT.textContent = simTime.toFixed(2) + ' s';
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  renderer.setSize(canvas.parentElement.clientWidth, window.innerHeight - 60);
  updateCamera();
});

requestAnimationFrame(animate);
</script>
</body>
</html>
